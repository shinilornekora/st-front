server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Проксируем /api/* на бэкенд
    # BACKEND_HOST задаётся через переменную окружения в docker-compose.yml
    # или подставляется envsubst при старте контейнера
    location /api/ {
        proxy_pass http://${BACKEND_HOST}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Передаём cookies для httpOnly refresh token
        proxy_pass_header Set-Cookie;
    }

    # SPA fallback — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэшируем статические ассеты
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
